<svg width="1800" height="1000" viewBox="0 0 1800 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="void" x1="0" y1="0" x2="1800" y2="1000">
      <stop offset="0" stop-color="#02030a"/>
      <stop offset="0.42" stop-color="#050b18"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="49%" r="48%">
      <stop offset="0" stop-color="#f6c85f" stop-opacity="0.42"/>
      <stop offset="0.24" stop-color="#1d4ed8" stop-opacity="0.30"/>
      <stop offset="0.62" stop-color="#020617" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2bf"/>
      <stop offset="0.35" stop-color="#d8b76a"/>
      <stop offset="0.70" stop-color="#9f6d23"/>
      <stop offset="1" stop-color="#5b3b0b"/>
    </linearGradient>
    <linearGradient id="signal" x1="280" y1="500" x2="1520" y2="500">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.33" stop-color="#818cf8"/>
      <stop offset="0.66" stop-color="#f8e7b0"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="26" stdDeviation="25" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="microgrid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#1e293b" stroke-width="1" opacity="0.35"/>
      <circle cx="0" cy="0" r="1.6" fill="#334155" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1800" height="1000" fill="url(#void)"/>
  <rect width="1800" height="1000" fill="url(#coreGlow)"/>
  <rect width="1800" height="1000" fill="url(#microgrid)" opacity="0.26"/>

  <rect x="54" y="54" width="1692" height="892" rx="38" stroke="#1e293b" stroke-width="2"/>
  <rect x="82" y="82" width="1636" height="836" rx="30" stroke="#0f172a" stroke-width="2"/>

  <g opacity="0.52">
    <path d="M193 805 C515 665, 665 812, 900 650 C1135 488, 1320 650, 1608 472" stroke="#1e40af" stroke-width="2" opacity="0.46"/>
    <path d="M193 838 C515 698, 665 845, 900 683 C1135 521, 1320 683, 1608 505" stroke="#d8b76a" stroke-width="1.4" opacity="0.32"/>
    <path d="M193 772 C515 632, 665 779, 900 617 C1135 455, 1320 617, 1608 439" stroke="#22c55e" stroke-width="1.2" opacity="0.22"/>
  </g>

  <text x="122" y="132" font-family="Inter, Arial, sans-serif" font-size="48" fill="#f8fafc" font-weight="900" letter-spacing="1.4">ELYRIA ACCELERATOR FABRIC</text>
  <text x="124" y="174" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">15D+ consequence-boundary enforcement for accelerator-bound AI workloads</text>
  <text x="124" y="206" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">pre-dispatch standing · SMC witness · thermo-standing · fabric quiesce · receipt/replay · fail-closed control</text>

  <g transform="translate(1260 112)" filter="url(#shadow)">
    <rect width="410" height="62" rx="18" fill="#050814" stroke="url(#gold)" stroke-width="1.8"/>
    <circle cx="35" cy="31" r="12" fill="#22c55e" opacity="0.9"/>
    <circle cx="35" cy="31" r="20" stroke="#22c55e" stroke-width="1" opacity="0.36"/>
    <text x="223" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#f8e7b0" font-weight="900">PROTECTED PUBLIC PROOF SURFACE</text>
  </g>

  <!-- Central nonstandard 15D admissibility reactor -->
  <g transform="translate(900 500)" filter="url(#shadow)">
    <circle r="196" fill="#030712" stroke="#1e293b" stroke-width="2"/>
    <circle r="166" fill="#07111f" stroke="url(#gold)" stroke-width="2.8"/>
    <circle r="118" fill="#020617" stroke="#334155" stroke-width="1.5"/>
    <circle r="62" fill="#111827" stroke="#d8b76a" stroke-width="2.6"/>
    <circle r="24" fill="#f8e7b0" opacity="0.92" filter="url(#softGlow)"/>
    <path d="M0 -196 L38 -66 L166 -103 L78 10 L166 103 L38 66 L0 196 L-38 66 L-166 103 L-78 10 L-166 -103 L-38 -66 Z" stroke="url(#signal)" stroke-width="3" fill="none" opacity="0.88"/>
    <path d="M-138 -138 L138 138 M138 -138 L-138 138 M0 -196 V196 M-196 0 H196" stroke="#334155" stroke-width="1.4" opacity="0.62"/>
    <text y="-18" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#f8fafc" font-weight="900">15D+</text>
    <text y="16" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f8e7b0" font-weight="900">STANDING</text>
    <text y="43" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#94a3b8">RESOLVER</text>
  </g>

  <!-- left workload object -->
  <g transform="translate(196 360)" filter="url(#shadow)">
    <path d="M0 0 H360 L420 70 V232 H0 Z" fill="#050814" stroke="#334155" stroke-width="2"/>
    <path d="M360 0 V70 H420" stroke="#d8b76a" stroke-width="2"/>
    <text x="34" y="58" font-family="Inter, Arial, sans-serif" font-size="28" fill="#f8fafc" font-weight="900">WORKLOAD</text>
    <text x="34" y="96" font-family="Inter, Arial, sans-serif" font-size="15" fill="#94a3b8">schedulable does not mean admissible</text>
    <rect x="34" y="132" width="288" height="42" rx="11" fill="#0f172a" stroke="#1e293b"/>
    <text x="178" y="159" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">GPU available ≠ standing resolved</text>
  </g>

  <!-- right dispatch object -->
  <g transform="translate(1184 360)" filter="url(#shadow)">
    <path d="M0 70 L60 0 H420 V232 H0 Z" fill="#050814" stroke="#334155" stroke-width="2"/>
    <path d="M0 70 H60 V0" stroke="#d8b76a" stroke-width="2"/>
    <text x="58" y="58" font-family="Inter, Arial, sans-serif" font-size="28" fill="#f8fafc" font-weight="900">FABRIC DECISION</text>
    <text x="58" y="96" font-family="Inter, Arial, sans-serif" font-size="15" fill="#94a3b8">dispatch, refuse, halt, throttle, fence</text>
    <rect x="58" y="132" width="288" height="42" rx="11" fill="#0f172a" stroke="#1e293b"/>
    <text x="202" y="159" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">only EXECUTE consumes accelerator</text>
  </g>

  <!-- data lines -->
  <g stroke="url(#signal)" stroke-width="6" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M616 475 C688 430, 744 430, 778 455"/>
    <path d="M1022 545 C1080 588, 1138 588, 1184 532"/>
  </g>
  <g stroke="#d8b76a" stroke-width="2" opacity="0.8">
    <path d="M616 515 C688 560, 744 560, 778 535"/>
    <path d="M1022 465 C1080 422, 1138 422, 1184 478"/>
  </g>

  <!-- bottom capsules -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">
    <rect x="126" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="245" y="800" text-anchor="middle" fill="#f8fafc">PRE-DISPATCH</text>
    <text x="245" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">before GPU execution</text>
    <rect x="394" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="513" y="800" text-anchor="middle" fill="#f8fafc">SMC WITNESS</text>
    <text x="513" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">fabric enforcement anchor</text>
    <rect x="662" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="781" y="800" text-anchor="middle" fill="#f8fafc">THERMO-STANDING</text>
    <text x="781" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">capacity must carry burden</text>
    <rect x="930" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="1049" y="800" text-anchor="middle" fill="#f8fafc">CORRIDOR LAW</text>
    <text x="1049" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">tenant · model · path</text>
    <rect x="1198" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="1317" y="800" text-anchor="middle" fill="#f8fafc">RECEIPT / REPLAY</text>
    <text x="1317" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">decision proof persists</text>
    <rect x="1466" y="772" width="238" height="66" rx="18" fill="#050814" stroke="#334155"/>
    <text x="1585" y="800" text-anchor="middle" fill="#f8fafc">FAIL-CLOSED</text>
    <text x="1585" y="823" text-anchor="middle" fill="#94a3b8" font-size="11">uncertainty blocks dispatch</text>
  </g>

  <rect x="116" y="878" width="1568" height="58" rx="20" fill="#030712" stroke="url(#gold)" stroke-width="1.4"/>
  <text x="900" y="914" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#f8e7b0">Nothing reaches accelerator execution unless standing resolves first.</text>
</svg>