    <radialGradient id="sunCore" cx="50%" cy="50%" r="48%">
      <stop offset="0" stop-color="#fff6c7" stop-opacity="0.98"/>
      <stop offset="0.13" stop-color="#fbbf24" stop-opacity="0.88"/>
      <stop offset="0.32" stop-color="#f97316" stop-opacity="0.58"/>
      <stop offset="0.58" stop-color="#7c2d12" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueCore" cx="50%" cy="48%" r="42%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#1e3a8a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.38" stop-color="#d8b76a"/>
      <stop offset="0.72" stop-color="#a66f1f"/>
      <stop offset="1" stop-color="#5b3b0b"/>
