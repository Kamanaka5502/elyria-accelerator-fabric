  <rect x="118" y="898" width="1564" height="52" rx="18" fill="#050814" stroke="url(#gold)" stroke-width="1.8"/>
  <text x="900" y="931" text-anchor="middle" font-family="Georgia, serif" font-size="25" fill="#f8e7b0">Nothing reaches accelerator execution unless standing resolves first.</text>
