      <text x="334" y="257" text-anchor="middle" fill="#cbd5e1">OK</text>

      <rect x="66" y="332" width="60" height="60" rx="12" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
      <text x="96" y="367" text-anchor="middle" fill="#cbd5e1">GPU</text>
      <rect x="185" y="332" width="60" height="60" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2"/>
      <text x="215" y="367" text-anchor="middle" fill="#fecaca">FENCE</text>
      <rect x="304" y="332" width="60" height="60" rx="12" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
      <text x="334" y="367" text-anchor="middle" fill="#cbd5e1">GPU</text>
