  <!-- decision tokens -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="950">
    <rect x="116" y="805" width="246" height="62" rx="17" fill="#050814" stroke="#334155"/>
    <text x="239" y="831" text-anchor="middle" fill="#f8fafc">PRE-DISPATCH</text><text x="239" y="853" text-anchor="middle" fill="#94a3b8" font-size="11">before compute is consumed</text>
    <rect x="390" y="805" width="246" height="62" rx="17" fill="#050814" stroke="#334155"/>
    <text x="513" y="831" text-anchor="middle" fill="#f8fafc">THERMO-STANDING</text><text x="513" y="853" text-anchor="middle" fill="#94a3b8" font-size="11">capacity carries burden</text>
    <rect x="664" y="805" width="246" height="62" rx="17" fill="#050814" stroke="#334155"/>
    <text x="787" y="831" text-anchor="middle" fill="#f8fafc">CORRIDOR LAW</text><text x="787" y="853" text-anchor="middle" fill="#94a3b8" font-size="11">tenant · model · route</text>
