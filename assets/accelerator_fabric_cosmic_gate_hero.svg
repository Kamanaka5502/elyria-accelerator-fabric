<svg width="1800" height="1000" viewBox="0 0 1800 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1000">
      <stop offset="0" stop-color="#02030a"/>
      <stop offset="0.42" stop-color="#07111f"/>
      <stop offset="1" stop-color="#16111f"/>
    </linearGradient>
    <radialGradient id="warmCore" cx="52%" cy="50%" r="58%">
      <stop offset="0" stop-color="#f8e7b0" stop-opacity="0.34"/>
      <stop offset="0.22" stop-color="#f97316" stop-opacity="0.26"/>
      <stop offset="0.48" stop-color="#1d4ed8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.35" stop-color="#d8b76a"/>
      <stop offset="0.72" stop-color="#a66f1f"/>
      <stop offset="1" stop-color="#4a2f08"/>
    </linearGradient>
    <linearGradient id="lane" x1="260" y1="500" x2="1540" y2="500">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.38" stop-color="#f8e7b0"/>
      <stop offset="0.68" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.72"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="micro" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M0 36H24M48 36H72M36 0V24M36 48V72" stroke="#334155" stroke-width="1" opacity="0.30"/>
      <circle cx="36" cy="36" r="2" fill="#d8b76a" opacity="0.34"/>
    </pattern>
  </defs>

  <rect width="1800" height="1000" fill="url(#bg)"/>
  <rect width="1800" height="1000" fill="url(#warmCore)"/>
  <rect width="1800" height="1000" fill="url(#micro)" opacity="0.52"/>

  <rect x="54" y="52" width="1692" height="896" rx="38" stroke="#334155" stroke-width="2"/>
  <rect x="86" y="84" width="1628" height="832" rx="28" stroke="#111827" stroke-width="2"/>

  <text x="110" y="130" font-family="Inter, Arial, sans-serif" font-size="43" fill="#f8fafc" font-weight="950" letter-spacing="1.5">ELYRIA ACCELERATOR FABRIC</text>
  <text x="112" y="169" font-family="Inter, Arial, sans-serif" font-size="17" fill="#f8e7b0" font-weight="850">15D+ PRE-DISPATCH ADMISSIBILITY BOUNDARY FOR ACCELERATOR-BOUND AI WORKLOADS</text>
  <text x="112" y="199" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">workload envelope · SMC witness · fabric mesh · thermo-standing · corridor law · receipt/replay · fail-closed dispatch</text>

