      <text x="334" y="147" text-anchor="middle" fill="#cbd5e1">GPU</text>

      <rect x="66" y="222" width="60" height="60" rx="12" fill="#111827" stroke="#f97316" stroke-width="2"/>
      <text x="96" y="257" text-anchor="middle" fill="#cbd5e1">TEN</text>
      <rect x="180" y="217" width="70" height="70" rx="14" fill="#050814" stroke="url(#gold)" stroke-width="3"/>
