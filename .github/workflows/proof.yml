name: Elyria Accelerator Fabric Public Surface Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-surface:
    name: protected-public-surface-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Confirm protected surface files exist
        run: |
          test -f README.md
          test -f PROOF_REPORT.md
          test -f PROTECTED_SCOPE.md
          test -f NON_IMPLEMENTATION_BOUNDARY.md
          test -f COMMERCIAL_ACCESS.md
          test -f assets/accelerator_fabric_cosmic_gate_hero.svg
      - name: Confirm no public implementation files are exposed
        run: |
          test ! -f accelerator_fabric_validator.py
          test ! -f test_accelerator_fabric_validator.py
      - name: Confirm protected boundary language
        run: |
          grep -q "protected public proof surface" README.md
          grep -q "No open-source license is granted" LICENSE
          grep -q "Do not disclose the machinery" README.md
          grep -q "private runtime law" PROTECTED_SCOPE.md
      - name: Confirm public claim remains bounded
        run: |
          grep -q "GPU availability is not execution admissibility" README.md
          grep -q "NVIDIA partnership" README.md
          grep -q "not open source" README.md
